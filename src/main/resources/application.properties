# Server Port (Render uses PORT env variable)
server.port=${PORT:8080}

# Database Configuration (PostgreSQL/H2)
# Fallback to H2 for local development, use environment variables for production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:lostfounddb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT
jwt.secret=${JWT_SECRET:campusLostAndFoundSecretKey2024SuperSecureKeyForJWTTokenGeneration}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS (Support for Vercel Frontend)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

